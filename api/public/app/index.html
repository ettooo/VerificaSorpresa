<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gestione Catalogo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="container">
                <h1>Class Dashboard</h1>
                <nav id="main-nav">
                    <button id="btn-admin-view" class="nav-link active">Admin Panel</button>
                    <button id="btn-supplier-view" class="nav-link">Supplier Panel</button>
                </nav>
                <div id="user-info">
                   <span id="current-user-role">Admin</span>
                </div>
            </div>
        </header>

        <main class="container">
            <section id="supplier-selection" class="card" style="display: none;">
                <h2>Seleziona Fornitore</h2>
                <select id="supplier-select">
                    <option value="">-- Caricamento --</option>
                </select>
                <button id="btn-login-supplier" class="btn btn-primary">Accedi come Fornitore</button>
            </section>

            <section id="content-area">
                <div class="toolbar">
                    <h2 id="section-title">Elenco Pezzi</h2>
                    <button id="btn-add-piece" class="btn btn-success">+ Nuovo Pezzo</button>
                </div>

                <div class="table-container">
                    <table id="pieces-table">
                        <thead>
                            <tr>
                                <th>Codice (PID)</th>
                                <th>Nome</th>
                                <th>Colore</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="pieces-body">
                            <!-- JS injected -->
                        </tbody>
                    </table>
                </div>

                <div id="pagination" class="pagination">
                    <!-- JS injected -->
                </div>
            </section>
        </main>

        <!-- Dialog details/edit -->
        <dialog id="piece-dialog" class="modal">
            <form method="dialog" id="piece-form">
                <h2 id="dialog-title">Dettagli Pezzo</h2>
                <div class="form-group">
                    <label for="p-pid">PID</label>
                    <input type="text" id="p-pid" name="pid" required>
                </div>
                <div class="form-group">
                    <label for="p-nome">Nome</label>
                    <input type="text" id="p-nome" name="pnome" required>
                </div>
                <div class="form-group">
                    <label for="p-colore">Colore</label>
                    <input type="text" id="p-colore" name="colore" required>
                </div>
                <!-- Solo per view dettagli/fornitore -->
                <div id="cost-group" class="form-group" style="display:none">
                    <label for="p-costo">Costo (Catalogo)</label>
                    <input type="number" step="0.01" id="p-costo" name="costo">
                </div>
                
                <div class="dialog-actions">
                    <button type="button" id="btn-close-dialog" class="btn btn-secondary">Annulla</button>
                    <button type="submit" id="btn-save-piece" class="btn btn-primary">Salva</button>
                </div>
            </form>
        </dialog>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
